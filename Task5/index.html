<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeStore E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <h2>🛒 FakeStore E-Commerce</h2>
            <div class="cart-container">
                Cart Items: <span id="cart-count">0</span>
            </div>
        </div>
        
        <div class="controls">
            <input type="text" id="search-input" placeholder="🔍 Search products by title...">
            
            <select id="category-select">
                <option value="all">All Categories</option>
                </select>

            <select id="sort-select">
                <option value="default">Sort by</option>
                <option value="low">Price: Low to High</option>
                <option value="high">Price: High to Low</option>
            </select>
        </div>
    </header>

    <main>
        <div id="product-container">
            <div class="message">Loading...</div>
        </div>
    </main>

    <div id="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="close-modal-btn">&times;</span>
            <img id="modal-img" src="" alt="Product Image">
            <h3 id="modal-title"></h3>
            <h2 id="modal-price" class="price-highlight"></h2>
            <p id="modal-desc"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
