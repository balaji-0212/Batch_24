<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Logic Tasks</title>
    <link rel="icon" href="data:,"> 
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <script>
        //Initial Student Data
        let students = [
          {id:1, name:"Naveen", mark:85, course:"MERN"},
          {id:2, name:"John", mark:45, course:"Python"},
          {id:3, name:"Priya", mark:72, course:"Java"},
          {id:4, name:"Arun", mark:95, course:"React"}
        ];

        // ---Task 1: Print All Students---
        console.log("--- Task 1: Print All Students ---");
        for (let i = 0; i < students.length; i++) {
          let s = students[i];
          console.log(`${s.id} ${s.name} ${s.mark} ${s.course}`);
        }

        // ---Task 2: Pass / Fail---
        console.log("\n--- Task 2: Pass / Fail ---");
        for (let i = 0; i < students.length; i++) {
          let s = students[i];
          let status = s.mark >= 50 ? "Pass" : "Fail";
          console.log(`${s.name} - ${status}`);
        }

        // ---Task 3: Grade System---
        console.log("\n--- Task 3: Grade System ---");
        for (let i = 0; i < students.length; i++) {
          let s = students[i];
          let grade;
          
          if (s.mark >= 90) {
            grade = "A Grade";
          } else if (s.mark >= 75) {
            grade = "B Grade";
          } else if (s.mark >= 50) {
            grade = "C Grade";
          } else {
            grade = "Fail";
          }
          
          console.log(`${s.name} - ${grade}`);
        }

        // ---Task 4: Topper Student---
        console.log("\n--- Task 4: Topper Student ---");
        let topper = students[0]; // Assume the first student is the topper to start
        for (let i = 1; i < students.length; i++) {
          if (students[i].mark > topper.mark) {
            topper = students[i]; // Update if we find a higher mark
          }
        }
        console.log(`Topper is ${topper.name} - ${topper.mark}`);

        // ---Task 5: Course Search---
        console.log("\n--- Task 5: Course Search ---");
        for (let i = 0; i < students.length; i++) {
          if (students[i].course === "React") {
            console.log("React Student Found:", students[i]);
          }
        }

        // ---Task 6: Add New Student---
        console.log("\n--- Task 6: Add New Student ---");
        students.push({id:5, name:"Rahul", mark:88, course:"Node JS"});
        console.log("Updated Student List:", students); 

        // ---Task 7: Attendance System---
        console.log("\n--- Task 7: Attendance System ---");
        let attendanceStatus = "present";

        switch (attendanceStatus) {
          case "present":
            console.log("Welcome");
            break;
          case "absent":
            console.log("Mark Absent");
            break;
          case "leave":
            console.log("Approved Leave");
            break;
          default:
            console.log("Invalid Status");
        }

        // ---Task 8: Login System---
        console.log("\n--- Task 8: Login System ---");
        let username = "admin";
        let password = "1234";

        if (username === "admin" && password === "1234") {
          console.log("Login Success");
        } else {
          console.log("Invalid User");
        }
    </script>
</body>
</html>
