<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Tasks</title>
    <link rel="icon" href="data:,"> 
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <script>
        console.log("--- 🔹 Task 1: Variable Update ---");
        var number = 50;
        number = 100;
        console.log(number);

        console.log("\n--- 🔹 Task 2: Let Variable Math ---");
        let marks = 80;
        marks = marks + 10; 
        console.log(marks);

        console.log("\n--- 🔹 Task 3: Const Value ---");
        const price = 500;
        const finalPrice = price + 100;
        console.log(finalPrice);

        console.log("\n--- 🔹 Task 4: Printing Statements ---");
        console.log("Welcome Team");
        console.log(2026);
        console.log(true);

        console.log("\n--- 🔹 Task 5: Datatype Check ---");
        console.log(typeof "JavaScript"); 
        console.log(typeof 250);          
        console.log(typeof false);        

        console.log("\n--- 🔹 Task 6: Array Task ---");
        const fruits = ["Apple", "Banana", "Mango", "Orange", "Grapes"];
        console.log(fruits); 
        console.log(fruits[0]); 
        console.log(fruits[4]); 

        console.log("\n--- 🔹 Task 7: Object Task ---");
        const student = {
          name: "Naveen",
          age: 20,
          course: "MERN"
        };
        console.log(student.name);
        console.log(student.age);

        console.log("\n--- 🔹 Task 8: Arithmetic Operators ---");
        console.log(20 + 10); 
        console.log(50 - 25); 
        console.log(5 * 5);   
        console.log(100 / 4); 
        console.log(20 % 3);  

        console.log("\n--- 🔹 Task 9: Increment / Decrement ---");
        let x = 5;
        x++;
        console.log("x =", x); 

        let y = 10;
        y--;
        console.log("y =", y); 

        console.log("\n--- 🔹 Task 10: Comparison Operators ---");
        console.log(10 > 5);      
        console.log(5 < 2);       
        console.log(20 == "20");  
        console.log(15 === "15"); 
        console.log(10 != 8);     

        console.log("\n--- 🔹 Task 11: Logical Operators ---");
        console.log(5 > 2 && 10 > 3); 
        console.log(7 < 5 || 8 > 2);  
        console.log(!(10 > 5));       

        console.log("\n--- 🔹 Task 12: Ternary Operator ---");
        let age = 18;
        let result = age >= 18 ? "Eligible" : "Not Eligible";
        console.log(result);
    </script>
</body>
</html>
